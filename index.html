    <!-- Google-friendly SiteNavigationElement Structured Data for Automatic Sitelinks -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Prayas One Professional Hub",
      "alternateName": "Prayas One",
      "url": "https://prayasone.in/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://prayasone.in/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Primary Navigation Channels",
      "itemListElement": [
        {
          "@type": "SiteNavigationElement",
          "position": 1,
          "name": "Home",
          "description": "Access the main feed, notices, updates, saved bookmark questions, and daily practice guides.",
          "url": "https://prayasone.in/home"
        },
        {
          "@type": "SiteNavigationElement",

        },
        {
          "@type": "SiteNavigationElement",
          "position": 3,

          "url": "https://prayasone.in/pdf"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 4,

        }

    }
